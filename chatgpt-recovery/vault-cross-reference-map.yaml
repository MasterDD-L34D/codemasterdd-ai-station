# Staging policy
staging:
  raw_landing: "Sources/raw/chatgpt-export-2026-05-14"
  processed_landing: "Sources/raw/chatgpt-export-2026-05-14/_processed/Cards"
  # _processed/Cards/<space>/<topic>/ structure
  promote_to_canonical: "Eduardo-direct only"
  rationale: "Sibling-peer NO-WRITE default for canonical Spaces. Bulk-imported Cards stay in staging until reviewed."

# Quality gates before promotion
promote_gates:
  - "Eduardo review sample 5-10 cards from each topic cluster"
  - "Verify LLM topic labels match content semantics"
  - "Check duplicate detection (existing vault Cards may already cover same content)"
  - "Confirm cross-link wikilinks resolve correctly"
  - "Sanitize PII if necessary (memory items contain real persons/places)"
