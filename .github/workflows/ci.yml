name: CI
# Server-side safety net for a direct-push (trunk-based) private repo: re-runs
# the load-bearing invariants that the local pre-commit hooks enforce, so a bad
# agent commit cannot land on main unverified (and cannot be bypassed with
# --no-verify). Lightweight, no PR required. See docs/research/2026-05-28-vc-governance-review.md.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  ascii-guard:
    name: ASCII guard (ADR-0021)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Compute changed code files
        id: changed
        env:
          BEFORE: ${{ github.event.before }}
          SHA: ${{ github.sha }}
          BASE: ${{ github.base_ref }}
        run: |
          if [ -n "$BASE" ]; then
            # PR event. Deepen the base fetch (NOT --depth=1) so a merge base with
            # HEAD always exists, then diff from the explicit merge base: identical
            # semantics to BASE...HEAD (added/changed lines on the PR side only) but
            # without the three-dot range, which exits 128 with "no merge base" when
            # a shallow base tip shares no ancestor with HEAD (e.g. base advanced via
            # a fast auto-merge-squash mid-run -- PR #429 flake). Degrade to tip-vs-tip
            # only if no common ancestor exists at all.
            git fetch --no-tags origin "$BASE" >/dev/null 2>&1 || true
            MERGE_BASE="$(git merge-base "origin/$BASE" HEAD 2>/dev/null || true)"
            if [ -n "$MERGE_BASE" ]; then
              RANGE="$MERGE_BASE HEAD"
            else
              RANGE="origin/$BASE HEAD"
            fi
            git diff --name-only $RANGE > changed.txt
          elif [ -n "$BEFORE" ] && [ "$BEFORE" != "0000000000000000000000000000000000000000" ] && git rev-parse --verify --quiet "$BEFORE^{commit}" >/dev/null; then
            git diff --name-only "$BEFORE" "$SHA" > changed.txt
            RANGE="$BEFORE $SHA"
          else
            git diff-tree --no-commit-id --name-only -r "$SHA" > changed.txt
            # Lone commit: diff vs parent for added-lines (root commit has no parent -> empty range, scan no-ops).
            if git rev-parse --verify --quiet "$SHA^{commit}~1" >/dev/null; then RANGE="$SHA~1 $SHA"; else RANGE=""; fi
          fi
          echo "RANGE=$RANGE" >> "$GITHUB_ENV"
          echo "list<<EOF" >> "$GITHUB_OUTPUT"; cat changed.txt >> "$GITHUB_OUTPUT"; echo "EOF" >> "$GITHUB_OUTPUT"
      - name: Scan ADDED lines for non-ASCII (ADR-0021, added-lines + marker)
        run: |
          # Addendum 2026-05-29: scan ONLY the ADDED lines in the diff (not the
          # whole file). Pre-existing legit non-ASCII (e.g. Italian accents in
          # SKIP_WORDS / natural-language regex) must NOT block an otherwise-ASCII
          # edit -- that file-scoped friction produced the PR #200 mangling
          # regression. Honor `# encoding-non-ascii-ok:` marker (parity with the
          # global pre-commit hook). Legacy frozen + ryzen-archive excluded.
          fail=0
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            case "$f" in
              docs/archive/ryzen-memory-archive/*) continue ;;
            esac
            case "$f" in
              *.ps1|*.sh|*.bat|*.cmd|*.py|*.js|*.mjs|*.json|*.yml|*.yaml)
                [ -f "$f" ] || continue
                # Marker bypass: intentional non-ASCII (accented data / regex).
                if grep -q 'encoding-non-ascii-ok' "$f"; then continue; fi
                # Added lines only: leading '+', excluding the '+++' file header.
                added="$(git diff $RANGE -- "$f" | grep '^+' | grep -v '^+++' || true)"
                if ! printf '%s' "$added" | perl -ne 'exit 1 if /[^\x00-\x7F]/'; then
                  echo "::error file=$f::non-ASCII bytes in ADDED lines (ADR-0021 ASCII-first; use -- not em-dash / ASCII quotes, or add a '# encoding-non-ascii-ok: <reason>' marker)"
                  fail=1
                fi ;;
            esac
          done < changed.txt
          if [ "$fail" != 0 ]; then
            echo "ADR-0021 violation: non-ASCII in ADDED code lines. Use -- not em-dash, ASCII quotes, or the marker."
            exit 1
          fi
          echo "ASCII guard OK (added-lines scope)"
  pytest:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run pytest (dep-light stable set)
        run: |
          # Stdlib-only, no app deps. Covers the root scripts/tests plus the
          # chatgpt-recovery stdlib test trees. The per-app suites (apps/*/tests)
          # need their own deps and are out of scope for this lightweight
          # safety-net gate; widen later if those apps grow CI of their own.
          # Each candidate dir is included only if it exists, so the gate stays
          # green on branches where a given test tree has not landed yet.
          python -m pip install --quiet pytest
          targets=""
          for d in scripts/tests chatgpt-recovery/scripts/tests chatgpt-recovery/pipeline/tests chatgpt-recovery/tests; do
            if [ -d "$d" ]; then targets="$targets $d"; fi
          done
          set +e
          python -m pytest -q $targets
          code=$?
          set -e
          if [ "$code" = 5 ]; then echo "pytest: no tests collected (pass)"; exit 0; fi
          exit "$code"
